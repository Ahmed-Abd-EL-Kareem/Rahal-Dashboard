<div class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen w-full flex items-center justify-center p-6 relative overflow-hidden">
  <!-- Atmospheric Background Elements -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
  
  <!-- Main Container -->
  <main class="w-full max-w-[480px] z-10">
    <!-- Brand Identity -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-4 shadow-md glow-subtle-light">
        <span class="material-symbols-outlined text-on-primary-container !text-3xl">travel_explore</span>
      </div>
      <h1 class="font-display-lg text-headline-sm font-bold text-primary tracking-tight">Rahal</h1>
    </div>

    <!-- Forgot Password Card -->
    <app-auth-card title="Forgot Password" description="Enter your email address and we'll send you a password reset code.">
      
      @if (errorMessage()) {
        <div class="flex items-start gap-3 p-4 rounded-xl mb-6 bg-error-container border border-error/20 animate-in fade-in slide-in-from-top-2 duration-200">
          <span class="material-symbols-outlined text-error !text-xl">error</span>
          <p class="text-sm font-medium text-error mt-0.5">{{ errorMessage() }}</p>
        </div>
      }

      <form [formRoot]="forgotForm" novalidate class="space-y-6">
        <!-- Email Input -->
        <app-form-field 
          id="email" 
          label="Email Address" 
          icon="mail" 
          [errors]="forgotForm.email().errors()" 
          [touched]="forgotForm.email().touched()"
        >
          <input 
            [formField]="forgotForm.email"
            class="w-full bg-white border border-border-subtle rounded-lg py-3 pl-12 pr-4 text-text-heading font-body-md placeholder:text-outline/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" 
            id="email" 
            placeholder="admin@rahal.com" 
            type="email"
            [class.border-error]="forgotForm.email().touched() && forgotForm.email().invalid()"
          />
        </app-form-field>

        <!-- Action Buttons -->
        <div class="space-y-4 pt-2">
          <app-button 
            type="submit" 
            [disabled]="forgotForm().invalid()" 
            [loading]="forgotForm().submitting()"
          >
            <span>Send Reset Code</span>
            <span class="material-symbols-outlined !text-lg">arrow_forward</span>
          </app-button>
          
          <a class="w-full flex items-center justify-center gap-2 py-3 text-text-body hover:text-text-heading font-label-md text-label-md transition-colors group select-none" routerLink="/login">
            <span class="material-symbols-outlined !text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
            <span>Back to Login</span>
          </a>
        </div>
      </form>
    </app-auth-card>

    <!-- Footer / Security Note -->
    <footer class="mt-8 text-center space-y-4">
      <div class="flex items-center justify-center gap-4 text-text-body/60">
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined !text-sm">verified_user</span>
          <span class="font-label-sm text-label-sm uppercase">Secure Encryption</span>
        </div>
        <div class="w-1 h-1 bg-border-subtle rounded-full"></div>
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined !text-sm">lock_person</span>
          <span class="font-label-sm text-label-sm uppercase">Privacy Protected</span>
        </div>
      </div>
      <p class="font-label-sm text-label-sm text-text-body/40">© 2026 Rahal Enterprise Suite. All rights reserved.</p>
    </footer>
  </main>

  <!-- Decorative Image Card -->
  <div class="hidden lg:block absolute right-12 top-1/2 -translate-y-1/2 w-[320px] group">
    <div class="bg-white p-4 rounded-2xl border border-border-subtle rotate-3 group-hover:rotate-0 transition-transform duration-500 shadow-xl">
      <img alt="Travel Destination" class="w-full h-48 object-cover rounded-xl mb-4 grayscale group-hover:grayscale-0 transition-all duration-700" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDm4LawvEcpbkpV5WhfGx9VQj4lUwV7DUHrd0swE1wR-FFAV75BzGHVXxZP5MM0VyFfNfCY0XmFMIEPcxFnGg42CSmVlJkIfw3W7GWq-v1YTPwgkeb0mnJarLVKrw03Icck8tbh3PcB3vr2ueued6ZPxs2SC-3usMDA6JHdJ71P6bHYYbvBrhlJFP7wCvUZ94G01d4eZM2lZZkw5RuIPd-zMXTzHusnz1FI6px7nqhVAQGmMgm2dUvgijQxDA5ShckvJE0tV9_kcPES"/>
      <div class="space-y-2">
        <div class="h-2 w-2/3 bg-primary/10 rounded-full"></div>
        <div class="h-2 w-1/2 bg-border-subtle/50 rounded-full"></div>
      </div>
    </div>
  </div>
</div>
