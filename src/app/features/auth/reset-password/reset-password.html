<div class="bg-bg-light flex items-center justify-center min-h-screen p-container-margin w-full relative overflow-hidden">
  <!-- Atmospheric Background Elements -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>

  <!-- Reset Password Container -->
  <div class="w-full max-w-md animate-in fade-in zoom-in duration-500 z-10">
    <!-- Brand Header -->
    <div class="flex flex-col items-center mb-8">
      <h1 class="font-display-lg text-headline-md font-bold text-primary tracking-tight select-none">Rahal</h1>
      <p class="font-label-md text-label-md text-outline uppercase tracking-widest mt-1 select-none">Enterprise Suite</p>
    </div>

    @if (successMode()) {
      <!-- Success Confirmation Card -->
      <app-auth-card title="Reset Successful" description="Your password has been updated successfully.">
        <div class="text-center py-4 space-y-6">
          <div class="w-16 h-16 bg-success/10 text-success rounded-full flex items-center justify-center mx-auto shadow-sm">
            <span class="material-symbols-outlined !text-4xl">check_circle</span>
          </div>
          
          <div class="space-y-4 pt-2">
            <a class="w-full bg-primary-container hover:bg-primary text-white font-title-lg text-title-lg py-4 rounded-lg transition-all duration-200 transform active:scale-[0.98] shadow-sm flex items-center justify-center gap-2 select-none" routerLink="/login">
              <span>Back to Login</span>
              <span class="material-symbols-outlined text-body-lg">arrow_forward</span>
            </a>
          </div>
        </div>
      </app-auth-card>
    } @else {
      <!-- Reset Form Card -->
      <app-auth-card title="Create New Password" description="Please choose a strong password for your Rahal account.">
        
        @if (errorMessage()) {
          <div class="flex items-start gap-3 p-4 rounded-xl mb-6 bg-error-container border border-error/20 animate-in fade-in duration-200">
            <span class="material-symbols-outlined text-error !text-xl">error</span>
            <p class="text-sm font-medium text-error mt-0.5">{{ errorMessage() }}</p>
          </div>
        }

        <form [formRoot]="resetForm" novalidate class="space-y-6">
          <!-- New Password Input -->
          <app-form-field 
            id="newPassword" 
            label="New Password" 
            icon="lock" 
            [errors]="resetForm.newPassword().errors()" 
            [touched]="resetForm.newPassword().touched()"
          >
            <input 
              [formField]="resetForm.newPassword"
              class="w-full bg-white border border-border-subtle rounded-lg py-3 pl-12 pr-12 text-on-surface font-body-md placeholder:text-outline/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" 
              id="newPassword" 
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••" 
              [class.border-error]="resetForm.newPassword().touched() && resetForm.newPassword().invalid()"
            />
            <button
              class="absolute flex items-center right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors cursor-pointer select-none"
              (click)="showPassword.set(!showPassword())"
              type="button"
            >
              <span class="material-symbols-outlined !text-xl">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </app-form-field>

          <!-- Password Strength Indicator -->
          <app-password-strength [password]="resetModel().newPassword"></app-password-strength>

          <!-- Confirm Password Input -->
          <app-form-field 
            id="confirmPassword" 
            label="Confirm New Password" 
            icon="lock" 
            [errors]="resetForm.confirmPassword().errors()" 
            [touched]="resetForm.confirmPassword().touched()"
          >
            <input 
              [formField]="resetForm.confirmPassword"
              class="w-full bg-white border border-border-subtle rounded-lg py-3 pl-12 pr-12 text-on-surface font-body-md placeholder:text-outline/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" 
              id="confirmPassword" 
              [type]="showConfirmPassword() ? 'text' : 'password'"
              placeholder="••••••••" 
              [class.border-error]="resetForm.confirmPassword().touched() && resetForm.confirmPassword().invalid()"
            />
            <button
              class="absolute flex items-center right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors cursor-pointer select-none"
              (click)="showConfirmPassword.set(!showConfirmPassword())"
              type="button"
            >
              <span class="material-symbols-outlined !text-xl">{{ showConfirmPassword() ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </app-form-field>

          <!-- Action Buttons -->
          <div class="space-y-4 pt-2">
            <app-button 
              type="submit" 
              [disabled]="resetForm().invalid()" 
              [loading]="resetForm().submitting()"
            >
              <span class="material-symbols-outlined text-body-lg">lock_reset</span>
              <span>Reset Password</span>
            </app-button>
            
            <div class="text-center border-t border-border-subtle/40 pt-4">
              <a class="inline-flex items-center justify-center gap-2 text-on-surface-variant hover:text-on-surface font-label-md text-label-md transition-colors group select-none" routerLink="/login">
                <span class="material-symbols-outlined !text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
                <span>Back to Login</span>
              </a>
            </div>
          </div>
        </form>
      </app-auth-card>
    }

    <!-- Footer -->
    <div class="mt-8 text-center select-none">
      <p class="font-label-md text-label-md text-on-surface-variant">
        Having trouble? <a class="text-primary font-bold hover:underline" href="#">Contact Support</a>
      </p>
    </div>
  </div>
</div>
